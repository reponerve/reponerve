# RepoNerve PR context — example workflow
# Copy to reponerve-pr.yml and enable on pull_request, or merge into your CI.
#
# Posts evidence-backed review + ship readiness as a PR comment.

name: RepoNerve PR Context

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write

jobs:
  reponerve-pr-context:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26"

      - name: Install RepoNerve
        run: go install github.com/reponerve/reponerve/cmd/reponerve@latest

      - name: Initialize memory
        run: |
          if [ ! -f .reponerve/memory.db ]; then
            reponerve init
            reponerve scan
          fi

      - name: Generate PR context
        id: context
        env:
          BASE_REF: ${{ github.base_ref }}
        run: |
          mapfile -t CHANGED < <(git diff --name-only "origin/${BASE_REF}"...HEAD)
          if [ "${#CHANGED[@]}" -eq 0 ]; then
            echo "No changed files; skipping."
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          reponerve pr-context --json "${CHANGED[@]}" > pr-context.json
          echo "skip=false" >> "$GITHUB_OUTPUT"

      - name: Comment on pull request
        if: steps.context.outputs.skip != 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const raw = fs.readFileSync('pr-context.json', 'utf8');
            const envelope = JSON.parse(raw);
            const body = envelope.structured?.pr_comment_markdown
              || envelope.formatted
              || 'RepoNerve PR context generated.';
            const marker = '<!-- reponerve-pr-context -->';
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(c => c.body && c.body.includes(marker));
            const fullBody = marker + '\n' + body;
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body: fullBody,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: fullBody,
              });
            }
